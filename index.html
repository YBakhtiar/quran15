<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>القرآن الكريم</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Vazirmatn:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ═══════════════════════════════════
           THEME VARIABLES
           ═══════════════════════════════════ */
        :root {
            --bg-primary: #FDF8F0;
            --bg-secondary: #FFFFFF;
            --bg-tertiary: #F0EAE0;
            --bg-elevated: rgba(255, 255, 255, 0.88);
            --text-primary: #2D1F14;
            --text-secondary: #5A4030;
            --text-muted: #8C7A65;
            --border-light: rgba(160, 130, 90, 0.15);
            --border-hover: rgba(160, 130, 90, 0.3);
            --border-decorative: rgba(200, 169, 81, 0.25);
            --accent: #B8860B;
            --accent-hover: #D4A017;
            --accent-soft: rgba(184, 134, 11, 0.1);
            --accent-glow: rgba(184, 134, 11, 0.2);
            --danger: #C0392B;
            --danger-soft: rgba(192, 57, 43, 0.1);
            --success: #27AE60;
            --modal-bg: #FFFFFF;
            --card-bg: rgba(255, 255, 255, 0.82);
            --image-filter: none;
            --pattern-opacity: 0.03;
            --shadow-soft: 0 2px 12px rgba(80, 50, 20, 0.08);
            --shadow-md: 0 8px 24px rgba(80, 50, 20, 0.12);
            --shadow-lg: 0 16px 40px rgba(80, 50, 20, 0.16);
            --shadow-page: 0 8px 32px rgba(80, 50, 20, 0.2);
        }

        body.night-mode {
            --bg-primary: #0F1923;
            --bg-secondary: #1A2B3E;
            --bg-tertiary: #243548;
            --bg-elevated: rgba(26, 43, 62, 0.92);
            --text-primary: #E8DED0;
            --text-secondary: #C8B89A;
            --text-muted: #8A7A60;
            --border-light: rgba(200, 180, 140, 0.12);
            --border-hover: rgba(200, 180, 140, 0.25);
            --border-decorative: rgba(212, 175, 55, 0.25);
            --accent: #D4AF37;
            --accent-hover: #E8C84A;
            --accent-soft: rgba(212, 175, 55, 0.12);
            --accent-glow: rgba(212, 175, 55, 0.25);
            --danger: #E74C3C;
            --danger-soft: rgba(231, 76, 60, 0.15);
            --success: #2ECC71;
            --modal-bg: #1A2B3E;
            --card-bg: rgba(26, 43, 62, 0.88);
            --image-filter: var(--night-filter-value);
            --pattern-opacity: 0.02;
            --shadow-soft: 0 2px 12px rgba(0, 0, 0, 0.4);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.5);
            --shadow-lg: 0 16px 40px rgba(0, 0, 0, 0.6);
            --shadow-page: 0 8px 32px rgba(0, 0, 0, 0.7);
        }

        body.dark-ui:not(.night-mode) {
            --bg-primary: #1A2538;
            --bg-secondary: #253548;
            --bg-tertiary: #2F4058;
            --bg-elevated: rgba(37, 53, 72, 0.92);
            --text-primary: #E0D8CC;
            --text-secondary: #B8A890;
            --text-muted: #807060;
            --border-light: rgba(200, 180, 140, 0.1);
            --border-hover: rgba(200, 180, 140, 0.2);
            --border-decorative: rgba(184, 134, 11, 0.2);
            --accent: #D4AF37;
            --accent-hover: #E8C84A;
            --accent-soft: rgba(212, 175, 55, 0.12);
            --modal-bg: #253548;
            --card-bg: rgba(37, 53, 72, 0.88);
            --pattern-opacity: 0.02;
            --shadow-soft: 0 2px 12px rgba(0, 0, 0, 0.4);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.5);
            --shadow-lg: 0 16px 40px rgba(0, 0, 0, 0.6);
            --shadow-page: 0 8px 32px rgba(0, 0, 0, 0.7);
        }

        /* ═══════════════════════════════════
           BASE STYLES
           ═══════════════════════════════════ */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg-primary);
            font-family: 'Vazirmatn', Tahoma, sans-serif;
            color: var(--text-primary);
            display: flex;
            height: 100vh;
            overflow: hidden;
            overscroll-behavior-y: contain;
            touch-action: none;
            transition: background-color 0.4s ease, color 0.4s ease;
            line-height: 1.5;
        }

        /* Subtle dot grid pattern */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            opacity: var(--pattern-opacity);
            background-image: radial-gradient(var(--accent) 0.6px, transparent 0.6px);
            background-size: 22px 22px;
            transition: opacity 0.4s;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 10px; }

        /* ═══════════════════════════════════
           FLOATING BUTTONS
           ═══════════════════════════════════ */
        .float-btn {
            position: fixed;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-elevated);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-light);
            border-radius: 50%;
            width: 46px;
            height: 46px;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.25s ease;
            box-shadow: var(--shadow-soft);
        }
        .float-btn:hover, .float-btn:active {
            color: var(--accent);
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md), 0 0 0 4px var(--accent-soft);
        }
        .float-btn svg { width: 20px; height: 20px; fill: currentColor; }

        .float-btn-pill {
            border-radius: 24px;
            width: auto;
            height: auto;
            padding: 10px 18px;
            gap: 6px;
            font-size: 13px;
            font-weight: 500;
            font-family: 'Vazirmatn', sans-serif;
        }

        .btn-menu { top: 18px; right: 18px; }
        .btn-settings { top: 18px; left: 18px; }
        .btn-download { bottom: 18px; right: 18px; }
        .btn-download.done { display: none; }
        .btn-fullscreen { bottom: 18px; left: 18px; }

        /* ═══════════════════════════════════
           OVERLAYS & MODALS (shared)
           ═══════════════════════════════════ */
        .overlay {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 16px;
            animation: overlayIn 0.25s ease;
        }
        .overlay.active { display: flex; }

        .overlay-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .modal-card {
            position: relative;
            z-index: 1;
            background: var(--modal-bg);
            border: 1px solid var(--border-light);
            border-radius: 28px;
            padding: 28px;
            max-width: 420px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
            color: var(--text-primary);
            animation: cardIn 0.3s ease;
            scrollbar-width: thin;
            scrollbar-color: var(--text-muted) transparent;
        }

        .modal-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 16px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-light);
            font-size: 20px;
            font-weight: 600;
        }
        .modal-header svg { width: 22px; height: 22px; fill: var(--accent); flex-shrink: 0; }

        .close-btn {
            width: 100%;
            padding: 14px;
            border-radius: 16px;
            border: 1px solid var(--border-light);
            background: transparent;
            color: var(--text-muted);
            font-family: 'Vazirmatn', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 16px;
        }
        .close-btn:hover { background: var(--bg-tertiary); color: var(--text-primary); }

        @keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes cardIn { from { opacity: 0; transform: translateY(16px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }

        /* ═══════════════════════════════════
           SPLASH SCREEN
           ═══════════════════════════════════ */
        .splash-overlay {
            z-index: 3000;
            background: var(--bg-primary);
        }
        .splash-overlay .overlay-backdrop { background: transparent; backdrop-filter: none; }

        .splash-card {
            position: relative;
            z-index: 1;
            background: var(--card-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border-decorative);
            border-radius: 40px;
            padding: 48px 32px 36px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: var(--shadow-lg);
            animation: splashIn 0.5s ease;
        }

        @keyframes splashIn {
            from { opacity: 0; transform: translateY(24px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .splash-title {
            font-family: 'Amiri', serif;
            font-size: 46px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), #8B6914, var(--accent-hover));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.4;
            margin-bottom: 4px;
        }

        .splash-divider {
            display: flex;
            align-items: center;
            gap: 14px;
            margin: 16px auto 20px;
            max-width: 240px;
            color: var(--accent);
            font-size: 14px;
        }
        .splash-divider::before, .splash-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }

        .splash-subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 32px;
        }

        .splash-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 1px solid var(--border-light);
            border-radius: 16px;
            background: var(--card-bg);
            color: var(--text-primary);
            font-size: 15px;
            font-weight: 600;
            font-family: 'Vazirmatn', sans-serif;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: var(--shadow-soft);
        }
        .splash-btn svg { width: 20px; height: 20px; fill: currentColor; }
        .splash-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            border-color: var(--border-hover);
        }
        .splash-btn-primary {
            background: var(--accent-soft);
            border-color: var(--accent);
            color: var(--accent);
        }
        body.night-mode .splash-btn-primary,
        body.dark-ui .splash-btn-primary {
            color: #F0E6D3;
            background: rgba(212, 175, 55, 0.18);
        }

        .splash-link {
            margin-top: 28px;
            font-size: 12px;
            opacity: 0.6;
        }
        .splash-link a {
            color: var(--text-muted);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
        }
        .splash-link a:hover { color: var(--accent); opacity: 1; }
        .splash-link svg { width: 15px; height: 15px; fill: currentColor; }

        /* ═══════════════════════════════════
           JUZ OVERLAY
           ═══════════════════════════════════ */
        .juz-overlay { z-index: 2500; }

        .juz-card {
            position: relative;
            z-index: 1;
            background: var(--card-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border-decorative);
            border-radius: 32px;
            padding: 28px 24px;
            max-width: 440px;
            width: 100%;
            max-height: 82vh;
            box-shadow: var(--shadow-lg);
            display: flex;
            flex-direction: column;
            animation: cardIn 0.3s ease;
        }

        .juz-continue-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px;
            border-radius: 16px;
            border: 1px solid var(--accent);
            background: var(--accent-soft);
            color: var(--accent);
            font-family: 'Vazirmatn', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            margin-bottom: 18px;
            flex-shrink: 0;
        }
        .juz-continue-btn svg { width: 18px; height: 18px; fill: currentColor; }
        .juz-continue-btn:hover { filter: brightness(1.1); transform: translateY(-2px); box-shadow: var(--shadow-md); }
        body.night-mode .juz-continue-btn,
        body.dark-ui .juz-continue-btn {
            color: #F0E6D3;
            background: rgba(212, 175, 55, 0.18);
        }

        .juz-grid-container {
            overflow-y: auto;
            flex-grow: 1;
            scrollbar-width: thin;
            scrollbar-color: var(--text-muted) transparent;
            padding: 4px;
        }

        .juz-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .juz-item {
            padding: 14px 8px;
            background: var(--card-bg);
            border: 1px solid var(--border-light);
            border-radius: 14px;
            text-align: center;
            cursor: pointer;
            font-family: 'Amiri', serif;
            font-size: 15px;
            font-weight: 700;
            color: var(--text-primary);
            transition: all 0.2s ease;
            animation: juzItemIn 0.3s ease backwards;
        }
        .juz-item:hover {
            border-color: var(--accent);
            background: var(--accent-soft);
            color: var(--accent);
            transform: translateY(-2px);
            box-shadow: var(--shadow-soft);
        }

        @keyframes juzItemIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ═══════════════════════════════════
           SETTINGS MODAL
           ═══════════════════════════════════ */
        .settings-overlay { z-index: 2500; }

        .section-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            margin-bottom: 10px;
            padding-right: 4px;
        }
        .settings-section { margin-bottom: 22px; }

        .settings-btn-row {
            width: 100%;
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid var(--border-light);
            background: var(--card-bg);
            color: var(--text-primary);
            font-family: 'Vazirmatn', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 6px 0;
        }
        .settings-btn-row svg { width: 18px; height: 18px; fill: currentColor; }
        .settings-btn-row:hover { background: var(--bg-tertiary); border-color: var(--border-hover); transform: translateY(-1px); }

        .settings-btn-row.accent {
            border-color: var(--accent);
            background: var(--accent-soft);
            color: var(--accent);
        }
        body.night-mode .settings-btn-row.accent { color: #F0E6D3; background: rgba(212,175,55,0.18); }

        .settings-btn-row.danger {
            border-color: var(--danger);
            background: var(--danger-soft);
            color: var(--danger);
        }

        /* Night filter panel */
        .filter-panel {
            margin-top: 8px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-light);
            border-radius: 16px;
            overflow: hidden;
        }
        .filter-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 14px 16px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-family: 'Vazirmatn', sans-serif;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        .filter-toggle:hover { background: var(--bg-secondary); }
        .filter-toggle .arrow { transition: transform 0.3s; font-size: 11px; }
        .filter-toggle.open .arrow { transform: rotate(180deg); }

        .filter-sliders {
            padding: 16px;
            border-top: 1px solid var(--border-light);
            background: var(--bg-secondary);
            display: none;
        }
        .filter-sliders.visible { display: block; }

        .slider-row { margin-bottom: 14px; }
        .slider-row label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            color: var(--text-secondary);
            font-size: 12px;
        }
        .slider-val {
            background: var(--bg-tertiary);
            padding: 2px 8px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-primary);
        }
        .slider-row input[type="range"] {
            width: 100%;
            cursor: pointer;
            -webkit-appearance: none;
            background: var(--bg-tertiary);
            border-radius: 10px;
            height: 5px;
        }
        .slider-row input::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px; height: 18px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            border: 2px solid var(--bg-primary);
            box-shadow: var(--shadow-soft);
        }
        .filter-reset {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid var(--border-light);
            background: var(--card-bg);
            color: var(--text-secondary);
            font-family: 'Vazirmatn', sans-serif;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .filter-reset:hover { background: var(--bg-tertiary); }
        .filter-reset svg { width: 14px; height: 14px; fill: currentColor; }

        /* ═══════════════════════════════════
           DOWNLOAD MODAL
           ═══════════════════════════════════ */
        .download-overlay { z-index: 2500; }

        .dl-option {
            width: 100%;
            padding: 16px;
            margin: 8px 0;
            border-radius: 16px;
            border: 1px solid var(--border-light);
            background: var(--card-bg);
            color: var(--text-primary);
            font-family: 'Vazirmatn', sans-serif;
            cursor: pointer;
            transition: all 0.25s;
            text-align: center;
        }
        .dl-option:hover {
            border-color: var(--accent);
            background: var(--accent-soft);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        .dl-option .dl-main { font-size: 15px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .dl-option .dl-main svg { width: 18px; height: 18px; fill: currentColor; }
        .dl-option .dl-sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
        .dl-option p { margin-bottom: 0; }

        .progress-pill {
            position: fixed;
            bottom: 72px;
            right: 18px;
            background: var(--bg-elevated);
            backdrop-filter: blur(10px);
            color: var(--text-secondary);
            font-size: 12px;
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-md);
            display: none;
            z-index: 150;
            font-family: 'Vazirmatn', sans-serif;
        }

        /* ═══════════════════════════════════
           CUSTOM DIALOGS (replace alert/confirm)
           ═══════════════════════════════════ */
        .dialog-overlay {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 16px;
            animation: overlayIn 0.2s ease;
        }
        .dialog-overlay .overlay-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        .dialog-card {
            position: relative;
            z-index: 1;
            background: var(--modal-bg);
            border: 1px solid var(--border-light);
            border-radius: 24px;
            padding: 28px;
            max-width: 360px;
            width: 100%;
            box-shadow: var(--shadow-lg);
            animation: cardIn 0.25s ease;
        }
        .dialog-title {
            font-family: 'Vazirmatn', sans-serif;
            font-size: 17px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 10px;
        }
        .dialog-message {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.7;
            margin-bottom: 24px;
        }
        .dialog-actions { display: flex; gap: 8px; justify-content: flex-end; }
        .dialog-btn {
            padding: 10px 22px;
            border-radius: 12px;
            font-family: 'Vazirmatn', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        .dialog-btn-ok {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }
        .dialog-btn-ok:hover { background: var(--accent-hover); }
        .dialog-btn-cancel {
            background: transparent;
            color: var(--text-muted);
            border-color: var(--border-light);
        }
        .dialog-btn-cancel:hover { background: var(--bg-tertiary); }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(16px);
            background: var(--bg-elevated);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            color: var(--text-primary);
            padding: 12px 24px;
            border-radius: 14px;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-md);
            font-size: 14px;
            font-family: 'Vazirmatn', sans-serif;
            z-index: 10000;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
            text-align: center;
            max-width: 90%;
        }
        .toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* ═══════════════════════════════════
           MAIN CONTENT & PAGES
           ═══════════════════════════════════ */
        .main-content {
            position: relative;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100%;
            overflow: hidden;
            z-index: 1;
        }

        .quran-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            height: 96vh;
            width: 100%;
            padding: 0 56px;
            transition: opacity 0.15s ease;
        }

        .page-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            max-width: 48%;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--shadow-page);
            border: 1px solid var(--border-decorative);
            background: var(--bg-primary);
            position: relative;
            transform-origin: center center;
            will-change: transform;
        }
        .page-wrapper::after {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            border-radius: inherit;
            box-shadow: inset 0 0 24px rgba(0, 0, 0, 0.04);
        }
        body.night-mode .page-wrapper::after { box-shadow: inset 0 0 24px rgba(0, 0, 0, 0.15); }

        .page {
            height: 100%;
            width: 100%;
            object-fit: contain;
            border-radius: 16px;
            background-color: white;
            filter: var(--image-filter);
            transition: filter 0.4s ease, opacity 0.2s ease;
            user-select: none;
            -webkit-user-drag: none;
        }

        .page-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: var(--text-muted);
            background: var(--bg-tertiary);
            border-radius: 16px;
        }
        .page-placeholder .ph-num {
            font-family: 'Amiri', serif;
            font-size: 36px;
            font-weight: 700;
            color: var(--accent);
            opacity: 0.5;
        }
        .page-placeholder .ph-text { font-size: 12px; opacity: 0.6; }

        /* Navigation buttons (desktop) */
        .nav-btn {
            position: absolute;
            top: 0;
            height: 100%;
            width: 48px;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            z-index: 10;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all 0.3s ease;
        }
        .nav-btn:hover {
            opacity: 1;
            background: linear-gradient(to var(--grad-dir, left), var(--bg-elevated), transparent);
            color: var(--accent);
        }
        .nav-btn svg { width: 26px; height: 26px; fill: currentColor; }
        .nav-right { right: 0; --grad-dir: left; }
        .nav-left { left: 0; --grad-dir: right; }

        /* Page indicator */
        .page-indicator {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-elevated);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 6px 18px;
            border-radius: 20px;
            font-family: 'Amiri', serif;
            font-size: 14px;
            font-weight: 700;
            color: var(--text-muted);
            border: 1px solid var(--border-light);
            z-index: 100;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            white-space: nowrap;
        }
        .page-indicator.visible { opacity: 1; }

        /* ═══════════════════════════════════
           RESPONSIVE
           ═══════════════════════════════════ */
        @media (max-width: 768px) {

            .page { max-height: 95vh; border-radius: 12px; }

            .btn-fullscreen { display: none !important; }

<script>
/* ═══════════════════════════════════════════
   STORAGE WRAPPER (graceful fallback)
   ═══════════════════════════════════════════ */
const store = {
    _mem: {},
    get(key) {
        return this._mem[key] || null;
    },
    set(key, val) {
        this._mem[key] = val;
    }
};

/* ═══════════════════════════════════════════
   CUSTOM DIALOGS
   ═══════════════════════════════════════════ */
function showDialogConfirm(message, title) {
    title = title || 'تأیید';
    return new Promise(function(resolve) {
        var overlay = document.createElement('div');
        overlay.className = 'dialog-overlay';
        overlay.innerHTML =
            '<div class="overlay-backdrop"></div>' +
            '<div class="dialog-card">' +
                '<div class="dialog-title">' + title + '</div>' +
                '<div class="dialog-message">' + message + '</div>' +
                '<div class="dialog-actions">' +
                    '<button class="dialog-btn dialog-btn-cancel" data-action="cancel">لغو</button>' +
                    '<button class="dialog-btn dialog-btn-ok" data-action="ok">تأیید</button>' +
                '</div>' +
            '</div>';
        function cleanup(result) {
            overlay.remove();
            resolve(result);
        }
        overlay.querySelector('[data-action="ok"]').addEventListener('click', function() { cleanup(true); });
        overlay.querySelector('[data-action="cancel"]').addEventListener('click', function() { cleanup(false); });
        overlay.querySelector('.overlay-backdrop').addEventListener('click', function() { cleanup(false); });
        document.body.appendChild(overlay);
    });
}

function showToast(message, duration) {
    duration = duration || 3000;
    var toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = message;
    document.body.appendChild(toast);
    requestAnimationFrame(function() { toast.classList.add('visible'); });
    setTimeout(function() {
        toast.classList.remove('visible');
        setTimeout(function() { toast.remove(); }, 300);
    }, duration);
}

/* ═══════════════════════════════════════════
   CONSTANTS & STATE
   ═══════════════════════════════════════════ */
var TOTAL_PAGES = 623;
var GITHUB_BASE = 'https://raw.githubusercontent.com/YBakhtiar/quranh/main/';

var currentPage = 1;
var isDownloaded = false;
var objectUrls = { right: null, left: null };
var indicatorTimer = null;

// Zoom & Pan state
var currentScale = 1;
var translateX = 0, translateY = 0;
var lastTranslateX = 0, lastTranslateY = 0;
var initialPinchDistance = null;
var isPanning = false;
var lastTapTime = 0;
var hasMoved = false;

// Night filter defaults
var DEFAULT_FILTER = { invert: 0.90, brightness: 1.10, contrast: 1.05 };
var nightFilter;
try {
    nightFilter = JSON.parse(store.get('quran-night-filter')) || Object.assign({}, DEFAULT_FILTER);
} catch(e) {
    nightFilter = Object.assign({}, DEFAULT_FILTER);
}
var isDarkUI = store.get('quran-dark-ui') === 'true';

/* ═══════════════════════════════════════════
   THEME MANAGEMENT
   ═══════════════════════════════════════════ */
function updateNightFilter() {
    var f = 'invert(' + nightFilter.invert + ') brightness(' + nightFilter.brightness + ') contrast(' + nightFilter.contrast + ') hue-rotate(180deg)';
    document.documentElement.style.setProperty('--night-filter-value', f);
    store.set('quran-night-filter', JSON.stringify(nightFilter));
}
updateNightFilter();

function setTheme(mode) {
    if (mode === 'night') {
        document.body.classList.add('night-mode');
        document.body.classList.remove('dark-ui');
    } else {
        document.body.classList.remove('night-mode');
        if (isDarkUI) {
            document.body.classList.add('dark-ui');
        } else {
            document.body.classList.remove('dark-ui');
        }
    }
    store.set('quran-theme', mode);
    refreshSettingsUI();
}

function toggleTheme() {
    setTheme(document.body.classList.contains('night-mode') ? 'day' : 'night');
}

function toggleDarkUI() {
    if (document.body.classList.contains('night-mode')) return;
    isDarkUI = !isDarkUI;
    store.set('quran-dark-ui', String(isDarkUI));
    if (isDarkUI) {
        document.body.classList.add('dark-ui');
    } else {
        document.body.classList.remove('dark-ui');
    }
    refreshSettingsUI();
}

function refreshSettingsUI() {
    var isNight = document.body.classList.contains('night-mode');
    // Theme toggle button
    var themeBtn = document.getElementById('themeToggle');
    if (isNight) {
        themeBtn.innerHTML = '<svg viewBox="0 0 24 24" width="18" height="18"><circle cx="12" cy="12" r="5" fill="currentColor"/><g stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="1" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="6.34" y2="6.34"/><line x1="17.66" y1="17.66" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="6.34" y2="17.66"/><line x1="17.66" y1="6.34" x2="19.78" y2="4.22"/></g></svg> حالت روز';
    } else {
        themeBtn.innerHTML = '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79"/></svg> حالت شب';
    }

    // Dark UI toggle
    var darkBtn = document.getElementById('darkUiToggle');
    if (isNight) {
        darkBtn.style.display = 'none';
    } else {
        darkBtn.style.display = 'flex';
        darkBtn.textContent = isDarkUI ? '☀ پس‌زمینه روشن' : '◐ پس‌زمینه تیره';
        darkBtn.className = 'settings-btn-row' + (isDarkUI ? ' accent' : '');
    }

    // Filter panel
    var filterPanel = document.getElementById('filterPanel');
    filterPanel.style.display = isNight ? 'block' : 'none';
}

/* ═══════════════════════════════════════════
   HELPERS
   ═══════════════════════════════════════════ */
function toPersianNum(num) {
    var digits = ['۰','۱','۲','۳','۴','۵','۶','۷','۸','۹'];
    return num.toString().replace(/\d/g, function(x) { return digits[x]; });
}

function formatPageNumber(num) { return String(num).padStart(3, '0'); }

/* ═══════════════════════════════════════════
   PAGE INDICATOR
   ═══════════════════════════════════════════ */
function showPageIndicator() {
    var el = document.getElementById('pageIndicator');
    var isMobile = window.innerWidth <= 768;
    var displayPage = currentPage;
    if (!isMobile && currentPage % 2 === 0) displayPage = currentPage - 1;
    var text = 'صفحه ' + toPersianNum(displayPage);
    if (!isMobile) {
        var secondPage = displayPage + 1;
        if (secondPage <= TOTAL_PAGES) text = toPersianNum(displayPage) + ' – ' + toPersianNum(secondPage);
    }
    text += ' از ' + toPersianNum(TOTAL_PAGES);
    el.textContent = text;
    el.classList.add('visible');
    clearTimeout(indicatorTimer);
    indicatorTimer = setTimeout(function() { el.classList.remove('visible'); }, 2200);
}

/* ═══════════════════════════════════════════
   PAGE MANAGEMENT
   ═══════════════════════════════════════════ */
function applyTransform(smooth) {
    var rightW = document.getElementById('rightWrapper');
    var leftW = document.getElementById('leftWrapper');
    var t = 'translate(' + translateX + 'px, ' + translateY + 'px) scale(' + currentScale + ')';
    [rightW, leftW].forEach(function(w) {
        if (w) {
            w.style.transition = smooth ? 'transform 0.3s ease-out' : 'none';
            w.style.transform = t;
        }
    });
}

function resetZoom() {
    currentScale = 1;
    translateX = 0; translateY = 0;
    lastTranslateX = 0; lastTranslateY = 0;
    applyTransform(true);
}

function setupImageError(img, pageNum) {
    img.onerror = function() {
        var wrapper = this.parentElement;
        if (wrapper && !wrapper.querySelector('.page-placeholder')) {
            this.style.display = 'none';
            var ph = document.createElement('div');
            ph.className = 'page-placeholder';
            ph.innerHTML = '<span class="ph-num">' + toPersianNum(pageNum) + '</span><span class="ph-text">بارگذاری نشد</span>';
            wrapper.appendChild(ph);
        }
    };
    img.onload = function() {
        this.style.display = '';
        var ph = this.parentElement && this.parentElement.querySelector('.page-placeholder');
        if (ph) ph.remove();
    };
}

async function loadPageImage(imgId, cacheKey, side, pageNum) {
    var img = document.getElementById(imgId);
    if (!img) return;

    if (objectUrls[side]) { URL.revokeObjectURL(objectUrls[side]); objectUrls[side] = null; }

    setupImageError(img, pageNum);

    try {
        var cache = await caches.open('quran-cache-v1');
        var response = await cache.match(cacheKey);
        if (response) {
            var blob = await response.blob();
            objectUrls[side] = URL.createObjectURL(blob);
            img.src = objectUrls[side];
            return;
        }
    } catch(e) { /* cache unavailable */ }

    // Fallback to GitHub
    var fileName = cacheKey.split('/').pop();
    img.src = GITHUB_BASE + fileName;
}

function updatePages() {
    resetZoom();
    var isMobile = window.innerWidth <= 768;
    var rightW = document.getElementById('rightWrapper');
    var leftW = document.getElementById('leftWrapper');

    if (isMobile) {
        var url = 'images/Quran' + formatPageNumber(currentPage) + '.jpg';
        loadPageImage('rightPage', url, 'right', currentPage);
        leftW.style.display = 'none';
        rightW.style.display = 'flex';
    } else {
        var rightPN = (currentPage % 2 !== 0) ? currentPage : currentPage - 1;
        var leftPN = rightPN + 1;

        loadPageImage('rightPage', 'images/Quran' + formatPageNumber(rightPN) + '.jpg', 'right', rightPN);

        if (leftPN <= TOTAL_PAGES) {
            loadPageImage('leftPage', 'images/Quran' + formatPageNumber(leftPN) + '.jpg', 'left', leftPN);
            leftW.style.display = 'flex';
        } else {
            leftW.style.display = 'none';
        }
        rightW.style.display = 'flex';
        if (currentPage % 2 === 0) currentPage = rightPN;
    }

    store.set('lastQuranPage', currentPage.toString());
    try { if (window.location.protocol !== 'file:') history.replaceState(null, null, '#' + currentPage); } catch(e) { /* ignore */ }
    showPageIndicator();
}

function animateNav(direction, callback) {
    var container = document.getElementById('quranContainer');
    container.style.opacity = '0.4';
    container.style.transition = 'opacity 0.12s';
    setTimeout(function() {
        callback();
        container.style.opacity = '1';
    }, 120);
}

function nextPage() {
    var step = window.innerWidth <= 768 ? 1 : 2;
    if (currentPage + step <= TOTAL_PAGES) currentPage += step;
    else if (currentPage < TOTAL_PAGES) currentPage++;
    else return;
    animateNav(1, updatePages);
}

function prevPage() {
    var step = window.innerWidth <= 768 ? 1 : 2;
    if (currentPage - step >= 1) currentPage -= step;
    else if (currentPage > 1) currentPage--;
    else return;
    animateNav(-1, updatePages);
}

/* ═══════════════════════════════════════════
   DOWNLOAD & OFFLINE
   ═══════════════════════════════════════════ */
async function startDownload(quality) {
    closeOverlay('downloadOverlay');
    var sizeText = quality === 'hq' ? '۵۰۰ مگابایت' : '۷۰ مگابایت';
    var confirmed = await showDialogConfirm('فایل‌های آفلاین حدود ' + sizeText + ' حجم دارد. ادامه می‌دهید؟', 'دانلود آفلاین');
    if (!confirmed) return;

    var dlBtn = document.getElementById('btnDownload');
    var progress = document.getElementById('progressPill');

    dlBtn.style.pointerEvents = 'none';
    dlBtn.innerHTML = '<svg viewBox="0 0 24 24" width="18" height="18"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" fill="currentColor"/></svg> در حال دانلود...';
    progress.style.display = 'block';
    progress.textContent = 'در حال دانلود...';

    var hqBaseUrl = GITHUB_BASE;

    try {
        var cache = await caches.open('quran-cache-v1');
        var downloaded = 0;
        var batch = 10;

        for (var i = 1; i <= TOTAL_PAGES; i += batch) {
            var promises = [];
            for (var j = 0; j < batch && (i + j) <= TOTAL_PAGES; j++) {
                (function(pageIdx) {
                    var fileName = 'Quran' + String(pageIdx).padStart(3, '0') + '.jpg';
                    var cacheKey = 'images/' + fileName;
                    var fetchUrl = quality === 'hq' ? (hqBaseUrl + fileName) : cacheKey;
                    promises.push(
                        fetch(fetchUrl, { cache: 'reload' })
                            .then(function(resp) {
                                if (resp.ok) return cache.put(cacheKey, resp.clone()).then(function() { return true; });
                                return false;
                            })
                            .catch(function() { return false; })
                    );
                })(i + j);
            }
            await Promise.all(promises);
            downloaded += batch;
            progress.textContent = 'پیشرفت: ' + toPersianNum(Math.min(downloaded, TOTAL_PAGES)) + ' از ' + toPersianNum(TOTAL_PAGES);
        }

        setDownloadedUI();
        showToast('دانلود با موفقیت انجام شد! ✓', 4000);
        updatePages();
    } catch(err) {
        progress.textContent = '❌ خطا در دانلود';
        dlBtn.style.pointerEvents = 'auto';
        dlBtn.innerHTML = '<svg viewBox="0 0 24 24" width="18" height="18"><path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z" fill="currentColor"/></svg> تلاش مجدد';
    }
}

function setDownloadedUI() {
    var dlBtn = document.getElementById('btnDownload');
    var progress = document.getElementById('progressPill');
    if (dlBtn) { dlBtn.style.display = 'none'; dlBtn.classList.add('done'); }
    if (progress) progress.style.display = 'none';
    isDownloaded = true;
}

function resetDownloadedUI() {
    var dlBtn = document.getElementById('btnDownload');
    if (dlBtn) {
        dlBtn.style.display = 'flex';
        dlBtn.innerHTML = '<svg viewBox="0 0 24 24" width="18" height="18"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z" fill="currentColor"/></svg> دانلود آفلاین';
        dlBtn.style.pointerEvents = 'auto';
        dlBtn.classList.remove('done');
    }
    isDownloaded = false;
}

async function deleteOfflineFiles() {
    var confirmed = await showDialogConfirm('تمام فایل‌های دانلود شده حذف میشوند. ادامه می‌دهید؟', 'حذف فایل‌ها');
    if (!confirmed) return;
    try {
        var progress = document.getElementById('progressPill');
        progress.style.display = 'block';
        progress.textContent = 'در حال حذف...';
        await caches.delete('quran-cache-v1');
        resetDownloadedUI();
        progress.style.display = 'none';
        showToast('فایل‌های آفلاین حذف شدند');
        updatePages();
    } catch(e) {
        showToast('خطا در حذف فایل‌ها');
    }
}

/* ═══════════════════════════════════════════
   OVERLAY HELPERS
   ═══════════════════════════════════════════ */
function openOverlay(id) { document.getElementById(id).classList.add('active'); }
function closeOverlay(id) { document.getElementById(id).classList.remove('active'); }

/* ═══════════════════════════════════════════
   FULLSCREEN
   ═══════════════════════════════════════════ */
function toggleFullScreen() {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(function() {});
    } else if (document.exitFullscreen) {
        document.exitFullscreen();
    }
}

/* ═══════════════════════════════════════════
   TOUCH & GESTURE HANDLING
   ═══════════════════════════════════════════ */
var touchstartX = 0, touchstartY = 0, touchendX = 0, touchendY = 0, touchStartTime = 0;
var swipeArea = document.getElementById('swipeArea');

swipeArea.addEventListener('touchstart', function(e) {
    if (e.touches.length >= 2) {
        initialPinchDistance = Math.hypot(
            e.touches[0].clientX - e.touches[1].clientX,
            e.touches[0].clientY - e.touches[1].clientY
        );
        isPanning = false;
    } else if (e.touches.length === 1) {
        touchstartX = e.touches[0].clientX;
        touchstartY = e.touches[0].clientY;
        touchStartTime = Date.now();
        hasMoved = false;
        if (currentScale > 1) isPanning = true;
    }
}, { passive: false });

swipeArea.addEventListener('touchmove', function(e) {
    e.preventDefault();
    hasMoved = true;
    if (e.touches.length >= 2 && initialPinchDistance) {
        var dist = Math.hypot(
            e.touches[0].clientX - e.touches[1].clientX,
            e.touches[0].clientY - e.touches[1].clientY
        );
        currentScale = Math.min(Math.max(1, currentScale * (dist / initialPinchDistance)), 4);
        initialPinchDistance = dist;
        applyTransform(false);
    } else if (e.touches.length === 1 && isPanning && currentScale > 1) {
        translateX = lastTranslateX + (e.touches[0].clientX - touchstartX);
        translateY = lastTranslateY + (e.touches[0].clientY - touchstartY);
        applyTransform(false);
    }
}, { passive: false });

swipeArea.addEventListener('touchend', function(e) {
    if (e.touches.length > 0) {
        initialPinchDistance = null;
        if (e.touches.length === 1 && currentScale > 1) {
            touchstartX = e.touches[0].clientX;
            touchstartY = e.touches[0].clientY;
            lastTranslateX = translateX;
            lastTranslateY = translateY;
            isPanning = true;
        }
        return;
    }

    initialPinchDistance = null;
    if (isPanning) { lastTranslateX = translateX; lastTranslateY = translateY; isPanning = false; }

    if (!hasMoved) {
        var now = Date.now();
        if (now - lastTapTime < 300 && now - lastTapTime > 0) {
            resetZoom();
            lastTapTime = 0;
            return;
        }
        lastTapTime = now;
    } else {
        lastTapTime = 0;
    }

    if (currentScale <= 1.05 && e.changedTouches.length === 1 && hasMoved) {
        touchendX = e.changedTouches[0].clientX;
        touchendY = e.changedTouches[0].clientY;
        var diffX = Math.abs(touchendX - touchstartX);
        var diffY = Math.abs(touchendY - touchstartY);
        var timeDiff = Date.now() - touchStartTime;

        if (diffX > 80 && diffX > diffY * 2 && timeDiff < 600) {
            if (touchendX > touchstartX) nextPage(); else prevPage();
        }
    }
}, { passive: false });

/* ═══════════════════════════════════════════
   KEYBOARD NAVIGATION
   ═══════════════════════════════════════════ */
document.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowLeft') { e.preventDefault(); nextPage(); }
    if (e.key === 'ArrowRight') { e.preventDefault(); prevPage(); }
});

/* ═══════════════════════════════════════════
   BUILD JUZ GRID
   ═══════════════════════════════════════════ */
(function buildJuzGrid() {
    var grid = document.getElementById('juzGrid');
    for (var i = 1; i <= 30; i++) {
        var startPage;
        if (i === 1) startPage = 3;
        else if (i === 30) startPage = 588;
        else startPage = 4 + ((i - 1) * 20);

        var btn = document.createElement('button');
        btn.className = 'juz-item';
        btn.textContent = 'جزء ' + toPersianNum(i);
        btn.style.animationDelay = (i * 25) + 'ms';
        (function(sp) {
            btn.addEventListener('click', function() {
                var target = sp;
                if (window.innerWidth > 768 && target % 2 === 0) target -= 1;
                currentPage = target;
                updatePages();
                closeOverlay('juzOverlay');
            });
        })(startPage);
        grid.appendChild(btn);
    }
})();

document.getElementById('btnSettings').addEventListener('click', function() { openOverlay('settingsOverlay'); });
document.getElementById('btnDownload').addEventListener('click', function() { openOverlay('downloadOverlay'); });

document.getElementById('navLeft').addEventListener('click', nextPage);

// Filter panel
document.getElementById('filterToggle').addEventListener('click', function() {

});

var sliderInvert = document.getElementById('sliderInvert');
var sliderBrightness = document.getElementById('sliderBrightness');
var sliderContrast = document.getElementById('sliderContrast');
var valInvert = document.getElementById('valInvert');
var valBrightness = document.getElementById('valBrightness');
var valContrast = document.getElementById('valContrast');

function syncSliders() {
    nightFilter.invert = parseFloat(sliderInvert.value);
    nightFilter.brightness = parseFloat(sliderBrightness.value);
    nightFilter.contrast = parseFloat(sliderContrast.value);
    valInvert.textContent = nightFilter.invert.toFixed(2);
    valBrightness.textContent = nightFilter.brightness.toFixed(2);
    valContrast.textContent = nightFilter.contrast.toFixed(2);
    updateNightFilter();
}

sliderInvert.value = nightFilter.invert;
sliderBrightness.value = nightFilter.brightness;
sliderContrast.value = nightFilter.contrast;
valInvert.textContent = nightFilter.invert.toFixed(2);
valBrightness.textContent = nightFilter.brightness.toFixed(2);
valContrast.textContent = nightFilter.contrast.toFixed(2);

sliderInvert.addEventListener('input', syncSliders);
sliderBrightness.addEventListener('input', syncSliders);
sliderContrast.addEventListener('input', syncSliders);

// Download modal
document.getElementById('dlStandard').addEventListener('click', function() { startDownload('standard'); });
document.getElementById('dlHQ').addEventListener('click', function() { startDownload('hq'); });

// Close overlays on backdrop click
['juzOverlay', 'settingsOverlay', 'downloadOverlay'].forEach(function(id) {
    var el = document.getElementById(id);
    var backdrop = el.querySelector('.overlay-backdrop');
    if (backdrop) backdrop.addEventListener('click', function() { closeOverlay(id); });
});

// Resize & orientation
window.addEventListener('resize', updatePages);
window.addEventListener('orientationchange', function() { setTimeout(updatePages, 50); });

/* ═══════════════════════════════════════════
   INITIALIZATION
   ═══════════════════════════════════════════ */
(function init() {
    // Detect system dark mode
    var systemDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    var savedTheme = store.get('quran-theme');

    if (savedTheme) {
        setTheme(savedTheme);
    } else {
        setTheme(systemDark ? 'night' : 'day');
    }

    // Listen for system theme changes
    if (window.matchMedia) {
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
            if (!store.get('quran-theme')) {
                setTheme(e.matches ? 'night' : 'day');
            }
        });
    }

    // Load saved page
    var saved = store.get('lastQuranPage');
    if (saved && !isNaN(parseInt(saved))) {
        currentPage = parseInt(saved);
    }
    updatePages();

    // Check offline cache
    try {
        caches.open('quran-cache-v1').then(function(cache) {
            cache.match('images/Quran001.jpg').then(function(res) {
                if (res) setDownloadedUI();
            });
        });
    } catch(e) { /* cache unavailable */ }
})();
</script>
